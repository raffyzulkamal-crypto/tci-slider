<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.slider{
    width:100%;
    max-width:500px;
    height:450px;
    margin:auto;
    position:relative;
    overflow:hidden;
    border-radius:15px;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity .8s ease;
}

.slide.active{
    opacity:1;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.content{
    position:absolute;
    bottom:50px;
    left:50px;
    color:white;
}

.content h2{
    font-size:40px;
    margin-bottom:15px;
}

.content p{
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:12px 30px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#0056b3;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    color:white;
    background:rgba(0,0,0,.4);
    width:50px;
    height:50px;
    border-radius:50%;
    text-align:center;
    line-height:50px;
    cursor:pointer;
    user-select:none;
}

.prev{left:20px;}
.next{right:20px;}

.dots{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
}

.dot{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    background:white;
    margin:5px;
    cursor:pointer;
    opacity:.5;
}

.dot.active{
    opacity:1;
    background:#007bff;
}
</style>

</head>
<body>

<div class="slider">

<div class="slide active">
<img src="dapurkita.jpg" alt="Dapur Kita-Kita">
<div class="content">
<h2>TCI Care</h2>
<p>Sumbangan melalui Datuk Koh Chung Jade (Pengasas Dapur Kita-Kita).</p>
<a href="https://www.facebook.com/thonnycheeinitiative/posts/pfbid0aJkBC1W8xCgGKRMT3Bd3DdsCG3HLCqVKRJwMhW9aXjiA8urJSJPYWKfUXT41T8Dyl" class="btn" target="_blank">See More</a>
</div>
</div>

<div class="slide">
<img src="https://picsum.photos/id/1016/1200/450">
<div class="content">
<h2>TCI Care Bridge</h2>
<p>Semak bantuan dan aduan komuniti.</p>
<a href="https://facebook.com" class="btn" target="_blank">Ketahui Lagi</a>
</div>
</div>

<div class="slide">
<img src="https://picsum.photos/id/1018/1200/450">
<div class="content">
<h2>Sukarelawan</h2>
<p>Sertai pasukan kami hari ini.</p>
<a href="https://yourwebsite.com" class="btn" target="_blank">Sertai</a>
</div>
</div>

<div class="prev">&#10094;</div>
<div class="next">&#10095;</div>

<div class="dots"></div>

</div>

<script>

const slides=document.querySelectorAll(".slide");
const dotsContainer=document.querySelector(".dots");

let current=0;

slides.forEach((s,index)=>{
    let dot=document.createElement("span");
    dot.classList.add("dot");
    if(index==0) dot.classList.add("active");
    dot.onclick=()=>showSlide(index);
    dotsContainer.appendChild(dot);
});

const dots=document.querySelectorAll(".dot");

function showSlide(index){
    slides[current].classList.remove("active");
    dots[current].classList.remove("active");

    current=index;

    slides[current].classList.add("active");
    dots[current].classList.add("active");
}

document.querySelector(".next").onclick=()=>{
    showSlide((current+1)%slides.length);
}

document.querySelector(".prev").onclick=()=>{
    showSlide((current-1+slides.length)%slides.length);
}

setInterval(()=>{
    showSlide((current+1)%slides.length);
},5000);

</script>

</body>
</html>
